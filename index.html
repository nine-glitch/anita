<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anita</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
// ── DESCARGA PDF ──
document.getElementById('btn-descargar').addEventListener('click', async () => {
  if (estado.posts.length === 0) {
    mostrarToast('no hay nada para descargar todavía');
    setTimeout(ocultarToast, 2500);
    return;
  }

  const btn = document.getElementById('btn-descargar');
  btn.classList.add('btn-generando');
  mostrarToast('generando pdf…');

  await new Promise(r => setTimeout(r, 100));

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    const margen = 20;
    const ancho = doc.internal.pageSize.getWidth() - margen * 2;
    let y = margen;

    // Título
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(22);
    doc.setTextColor(181, 101, 29); // cobre
    doc.text('anita', margen, y);
    y += 6;

    doc.setFontSize(8);
    doc.setTextColor(155, 144, 128); // gris
    doc.setFont('helvetica', 'normal');
    doc.text('conversaciones', margen, y);
    y += 12;

    // Línea separadora
    doc.setDrawColor(216, 207, 192);
    doc.setLineWidth(0.3);
    doc.line(margen, y, margen + ancho, y);
    y += 10;

    const posts = [...estado.posts].reverse();

    for (const p of posts) {
      // Fecha
      if (p.fecha) {
        const fecha = new Date(p.fecha).toLocaleDateString('es-PY', {
          day: 'numeric', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        doc.setFontSize(7);
        doc.setTextColor(155, 144, 128);
        doc.setFont('helvetica', 'normal');
        const fechaLines = doc.splitTextToSize(fecha, ancho);
        doc.text(fechaLines, margen, y);
        y += fechaLines.length * 4 + 2;
      }

      // Texto del post
      doc.setFontSize(10);
      doc.setTextColor(17, 16, 9);
      doc.setFont('helvetica', 'italic');
      const textoLines = doc.splitTextToSize(p.texto, ancho);
      
      // Verificar salto de página
      if (y + textoLines.length * 5 > doc.internal.pageSize.getHeight() - margen) {
        doc.addPage();
        y = margen;
      }
      
      doc.text(textoLines, margen, y);
      y += textoLines.length * 5 + 4;

      // Respuesta Anita
      doc.setFontSize(7);
      doc.setTextColor(181, 101, 29);
      doc.setFont('helvetica', 'normal');
      doc.text('anita', margen + 4, y);
      y += 4;

      doc.setFontSize(9.5);
      doc.setTextColor(30, 28, 21);
      doc.setFont('helvetica', 'normal');
      const respLines = doc.splitTextToSize(p.respuesta, ancho - 4);

      if (y + respLines.length * 5 > doc.internal.pageSize.getHeight() - margen) {
        doc.addPage();
        y = margen;
      }

      // Línea cobre izquierda
      doc.setDrawColor(181, 101, 29);
      doc.setLineWidth(0.5);
      doc.line(margen + 1, y - 3, margen + 1, y + respLines.length * 5);

      doc.text(respLines, margen + 4, y);
      y += respLines.length * 5 + 12;

      // Separador entre entradas
      if (y < doc.internal.pageSize.getHeight() - margen) {
        doc.setDrawColor(216, 207, 192);
        doc.setLineWidth(0.2);
        doc.line(margen, y - 6, margen + ancho, y - 6);
      }
    }

    // Pie de página en última página
    const totalPages = doc.internal.getNumberOfPages();
    for (let i = 1; i <= totalPages; i++) {
      doc.setPage(i);
      doc.setFontSize(7);
      doc.setTextColor(155, 144, 128);
      doc.setFont('helvetica', 'normal');
      doc.text(
        `${i} / ${totalPages}`,
        doc.internal.pageSize.getWidth() / 2,
        doc.internal.pageSize.getHeight() - 10,
        { align: 'center' }
      );
    }

    const fecha = new Date().toISOString().slice(0, 10);
    doc.save(`anita-${fecha}.pdf`);
    ocultarToast();

  } catch (err) {
    console.error('PDF error:', err);
    mostrarToast('algo falló generando el pdf');
    setTimeout(ocultarToast, 2500);
  }

  btn.classList.remove('btn-generando');
});

</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

  }

  .respuesta-anita::before {

    height: 0;

    animation: crecer-borde 0.6s ease forwards 0.1s;
  }

  @keyframes crecer-borde {
    to { height: 100%; }
  }

  .anita-nombre {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--cobre);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .anita-texto {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--negro-2);
    line-height: 1.75;
    margin-bottom: 0.75rem;
  }

  .anita-hook {

  .anita-tono {

  /* ── CARGANDO SKELETON ── */

    color: var(--gris-claro);
    font-style: normal;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;

  .busqueda-count {

    font-size: 0.65rem;

    padding: 0.25rem;

    gap: 2rem;

    border-radius: 2px;

    animation: pulso 1.2s ease infinite;
    color: var(--cobre) !important;

  /* ── SCROLLBAR ── */

  ::-webkit-scrollbar-track { background: var(--blanco); }
  ::-webkit-scrollbar-thumb { background: var(--blanco-2); }

  @media (max-width: 480px) {
    .splash-nombre { font-size: 2.8rem; }
    #app { padding: 0 1.25rem; }
    textarea { font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-nombre">anita</div>
  <div class="splash-linea"></div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <div class="header-nombre">an<span>i</span>ta</div>
      <div class="header-tagline">contale a anita. ella interpreta. ella recuerda.</div>
    </div>

async function enviar() {
  const texto = textarea.value.trim();
  if (!texto || estado.cargando) return;

  // Verificar límite free
  if (!estado.pro && estado.totalPosts >= LIMITE_FREE) {

  // Ocultar estado vacío
  document.getElementById('estado-vacio').style.display = 'none';

  // Agregar entrada al feed
  const entradaId = Date.now();
  const entradaEl = crearEntrada(texto, entradaId);
  document.getElementById('feed').prepend(entradaEl);

  // Mostrar skeleton

  entradaEl.appendChild(skeletonEl);

  // Toast si tarda

  try {
    const historial = estado.posts.slice(-10).map(p =>
      `POST: ${p.texto}\nANITA: ${p.respuesta}`
    ).join('\n\n');

    const userMsg = historial
      ? `Historial reciente:\n${historial}\n\nNuevo post: ${texto}`

    const res = await fetch('/api/proxy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-user-id': estado.userId
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: fotoBase64 ? [
            { type: 'image', source: { type: 'base64', media_type: fotoMediaType, data: fotoBase64 } },
            { type: 'text', text: userMsg }
          ] : userMsg
        }]
      })
    });

    const data = await res.json();
    const raw = data.content.map(i => i.text || '').join('');

    let parsed;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      parsed = {
        respuesta: raw.slice(0, 200),
        tono: 'filoso',
        hook: '',
        pregunta: null,
        tema_interno: '',
        silencio: false
      };
    }

    clearTimeout(toastTimer);
    ocultarToast();

    // Guardar en estado
    estado.posts.push({ texto, respuesta: parsed.respuesta, fecha: new Date() });
    estado.totalPosts++;
    localStorage.setItem('anita-total', estado.totalPosts.toString());
    actualizarEstadoPro();

    fotoBase64 = null;
    fotoMediaType = null;

    // Reemplazar skeleton con respuesta

    const respuestaEl = crearRespuesta(parsed);
    entradaEl.appendChild(respuestaEl);

    // Actualizar mood según tono
    actualizarMoodPorTono(parsed.tono);

  } catch (err) {
    clearTimeout(toastTimer);
    ocultarToast();
    skeletonEl.remove();
    mostrarToast('algo falló. intentá de nuevo.');

function crearEntrada(texto, id) {
  const div = document.createElement('div');

    <div class="entrada-meta">
      <span class="entrada-fecha">${fecha}</span>

}

function crearSkeleton(entradaId) {
  const div = document.createElement('div');
  div.className = 'skeleton';
  div.id = `skeleton-${entradaId}`;
  div.innerHTML = `
    <div class="skeleton-linea"></div>
    <div class="skeleton-linea"></div>

  return div;
}

function crearRespuesta(parsed) {
  const div = document.createElement('div');
  div.className = 'respuesta-anita';

  let html = `<div class="anita-nombre">anita</div>`;
  html += `<div class="anita-texto">${escapeHtml(parsed.respuesta)}</div>`;

  if (parsed.pregunta) {
    html += `<div class="anita-pregunta">${escapeHtml(parsed.pregunta)}</div>`;
  }

  // hook interno — no se muestra

  div.innerHTML = html;
  return div;
}

// ── SERVICE WORKER + PUSH ──
const VAPID_PUBLIC_KEY = 'REEMPLAZAR_CON_TU_VAPID_PUBLIC_KEY';

async function registrarSW() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    console.log('SW registrado');

    // Pedir permiso de notificaciones después de la primera respuesta de Anita
    estado.swReg = reg;
  } catch (err) {
    console.warn('SW error:', err);
  }
}

async function pedirPermisoPush() {
  if (!estado.swReg) return;
  if (Notification.permission === 'granted') {
    await suscribirPush();
    return;
  }
  if (Notification.permission === 'denied') return;

  const perm = await Notification.requestPermission();
  if (perm === 'granted') await suscribirPush();
}

async function suscribirPush() {
  if (!estado.swReg) return;
  try {
    const sub = await estado.swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    estado.pushSub = sub;
    // Guardar en localStorage para enviarlo al backend cuando haga falta
    localStorage.setItem('anita_push_sub', JSON.stringify(sub));
    console.log('Push suscripto');
  } catch (err) {
    console.warn('Push sub error:', err);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

registrarSW();

}

const btnBusqueda = document.getElementById('btn-busqueda');
const busquedaArea = document.getElementById('busqueda-area');
const busquedaInput = document.getElementById('busqueda-input');
const busquedaCerrar = document.getElementById('busqueda-cerrar');
const busquedaCount = document.getElementById('busqueda-count');
const resultadoBusqueda = document.getElementById('resultado-busqueda');
const feedEl = document.getElementById('feed');

btnBusqueda.addEventListener('click', () => {
  busquedaArea.classList.add('visible');
  busquedaInput.focus();
});

busquedaCerrar.addEventListener('click', cerrarBusqueda);

busquedaInput.addEventListener('input', () => {
  const q = busquedaInput.value.trim().toLowerCase();
  if (!q) {
    resultadoBusqueda.innerHTML = '';
    resultadoBusqueda.classList.remove('visible');
    feedEl.classList.remove('oculto');
    busquedaCount.textContent = '';
    return;
  }
  buscar(q);
});

busquedaInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') cerrarBusqueda();

function cerrarBusqueda() {
  busquedaArea.classList.remove('visible');
  busquedaInput.value = '';
  resultadoBusqueda.innerHTML = '';
  resultadoBusqueda.classList.remove('visible');
  feedEl.classList.remove('oculto');
  busquedaCount.textContent = '';
}

function buscar(q) {
  const matches = estado.posts.filter(p =>
    p.texto.toLowerCase().includes(q) || p.respuesta.toLowerCase().includes(q)
  );

  feedEl.classList.add('oculto');
  resultadoBusqueda.innerHTML = '';

  if (matches.length === 0) {
    busquedaCount.textContent = '0 resultados';
    resultadoBusqueda.classList.remove('visible');
    return;
  }

  busquedaCount.textContent = `${matches.length} resultado${matches.length !== 1 ? 's' : ''}`;
  resultadoBusqueda.classList.add('visible');

  matches.reverse().forEach(p => {
    const div = document.createElement('div');
    div.className = 'entrada';

    const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-PY', {
      day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
    }) : '';

    div.innerHTML = `
      <div class="entrada-meta">
        <span class="entrada-fecha">${fecha}</span>
      </div>
      <div class="entrada-texto">${highlight(escapeHtml(p.texto), q)}</div>
      <div class="respuesta-anita" style="animation:none">
        <div class="anita-nombre">anita</div>
        <div class="anita-texto">${highlight(escapeHtml(p.respuesta), q)}</div>
      </div>
    `;
    resultadoBusqueda.appendChild(div);
  });
}

function highlight(text, q) {
  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark class="match-highlight">$1</mark>');
}


// ── DESCARGA PDF ──
document.getElementById('btn-descargar').addEventListener('click', async () => {
  if (estado.posts.length === 0) {
    mostrarToast('no hay nada para descargar todavía');
    setTimeout(ocultarToast, 2500);
    return;
  }

  const btn = document.getElementById('btn-descargar');
  btn.classList.add('btn-generando');
  mostrarToast('generando pdf…');

  await new Promise(r => setTimeout(r, 100));

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    const margen = 20;
    const ancho = doc.internal.pageSize.getWidth() - margen * 2;
    let y = margen;

    // Título
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(22);
    doc.setTextColor(181, 101, 29); // cobre
    doc.text('anita', margen, y);
    y += 6;

    doc.setFontSize(8);
    doc.setTextColor(155, 144, 128); // gris
    doc.setFont('helvetica', 'normal');
    doc.text('conversaciones', margen, y);
    y += 12;

    // Línea separadora
    doc.setDrawColor(216, 207, 192);
    doc.setLineWidth(0.3);
    doc.line(margen, y, margen + ancho, y);
    y += 10;

    const posts = [...estado.posts].reverse();

    for (const p of posts) {
      // Fecha
      if (p.fecha) {
        const fecha = new Date(p.fecha).toLocaleDateString('es-PY', {
          day: 'numeric', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        doc.setFontSize(7);
        doc.setTextColor(155, 144, 128);
        doc.setFont('helvetica', 'normal');
        const fechaLines = doc.splitTextToSize(fecha, ancho);
        doc.text(fechaLines, margen, y);
        y += fechaLines.length * 4 + 2;
      }

      // Texto del post
      doc.setFontSize(10);
      doc.setTextColor(17, 16, 9);
      doc.setFont('helvetica', 'italic');
      const textoLines = doc.splitTextToSize(p.texto, ancho);
      
      // Verificar salto de página
      if (y + textoLines.length * 5 > doc.internal.pageSize.getHeight() - margen) {
        doc.addPage();
        y = margen;
      }
      
      doc.text(textoLines, margen, y);
      y += textoLines.length * 5 + 4;

      // Respuesta Anita
      doc.setFontSize(7);
      doc.setTextColor(181, 101, 29);
      doc.setFont('helvetica', 'normal');
      doc.text('anita', margen + 4, y);
      y += 4;

      doc.setFontSize(9.5);
      doc.setTextColor(30, 28, 21);
      doc.setFont('helvetica', 'normal');
      const respLines = doc.splitTextToSize(p.respuesta, ancho - 4);

      if (y + respLines.length * 5 > doc.internal.pageSize.getHeight() - margen) {
        doc.addPage();
        y = margen;
      }

      // Línea cobre izquierda
      doc.setDrawColor(181, 101, 29);
      doc.setLineWidth(0.5);
      doc.line(margen + 1, y - 3, margen + 1, y + respLines.length * 5);

      doc.text(respLines, margen + 4, y);
      y += respLines.length * 5 + 12;

      // Separador entre entradas
      if (y < doc.internal.pageSize.getHeight() - margen) {
        doc.setDrawColor(216, 207, 192);
        doc.setLineWidth(0.2);
        doc.line(margen, y - 6, margen + ancho, y - 6);
      }
    }

    // Pie de página en última página
    const totalPages = doc.internal.getNumberOfPages();
    for (let i = 1; i <= totalPages; i++) {
      doc.setPage(i);
      doc.setFontSize(7);
      doc.setTextColor(155, 144, 128);
      doc.setFont('helvetica', 'normal');
      doc.text(
        `${i} / ${totalPages}`,
        doc.internal.pageSize.getWidth() / 2,
        doc.internal.pageSize.getHeight() - 10,
        { align: 'center' }
      );
    }

    const fecha = new Date().toISOString().slice(0, 10);
    doc.save(`anita-${fecha}.pdf`);
    ocultarToast();

  } catch (err) {
    console.error('PDF error:', err);
    mostrarToast('algo falló generando el pdf');
    setTimeout(ocultarToast, 2500);
  }

  btn.classList.remove('btn-generando');
});

</script>
</body>
</html>
